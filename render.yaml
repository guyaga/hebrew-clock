services:
  - type: web
    name: hebrew-clock
    runtime: python
    plan: free
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: FONT_DIR
        value: .
      - key: DISPLAY_LAG
        value: 8
      - key: LOG_LEVEL
        value: info
      - key: PYTHON_VERSION
        value: "3.12.7"
